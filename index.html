<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mujagi77 | Logic Hub</title>
<link rel="canonical" href="https://mujagi77.github.io/">

<!-- SEO + SHARE -->
<meta name="description" content="Logičke i matematičke igre za trening mozga i logike. Besplatno, radi na svim uređajima.">
<meta property="og:title" content="Mujagi77 | Logic Hub">
<meta property="og:description" content="Logičke i matematičke igre za trening mozga i logike. Besplatno, radi na svim uređajima.">
<meta property="og:image" content="img/profilna.jpg">
<meta property="og:type" content="website">

<link rel="icon" href="img/favicon.png">

<style>
:root{
    --neon:#66fcf1;
    --card:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    background:#05070d;
    overflow-x:hidden;
}

#stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-2;
}

body::before, body::after{
    content:"";
    position:fixed;
    filter:blur(50px);
    z-index:-1;
}

body::before{
    width:600px;height:600px;
    background:radial-gradient(circle, rgba(102,252,241,0.12), transparent 60%);
    top:10%;left:15%;
}

body::after{
    width:500px;height:500px;
    background:radial-gradient(circle, rgba(79,172,254,0.12), transparent 60%);
    bottom:10%;right:10%;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

.profile{
    text-align:center;
    padding:30px;
    background:var(--card);
    border:1px solid rgba(102,252,241,0.2);
    border-radius:20px;
}

h1 {
    font-size: 24px;
    margin: 10px 0;
    font-weight: bold;
}

.profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:2px solid var(--neon);
    box-shadow:0 0 20px var(--neon);
}

#bio{
    margin-top: 15px;
    min-height: 100px;
    line-height: 1.6;
    color: var(--neon);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.5s ease-out, transform 1.5s ease-out;
}

#bio.visible {
    opacity: 1;
    transform: translateY(0);
}

.share-btn {
    margin-top: 15px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--neon);
    color: var(--neon);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: 0.3s;
}

.share-btn:hover {
    background: var(--neon);
    color: #05070d;
}

.grid{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.card{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px;
    background:var(--card);
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.1);
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
    border-color:var(--neon);
}

.card img{
    width:70px;
    height:70px;
    border-radius:10px;
}

.play{
    margin-left:auto;
    padding:8px 14px;
    border:1px solid var(--neon);
    color:var(--neon);
    border-radius:10px;
}

.youtube{
    margin-top:30px;
    text-align:center;
    padding:20px;
    background:var(--card);
    border-radius:20px;
    border:1px solid rgba(102,252,241,0.2);
}

.youtube img{
    width:160px;
    border-radius:14px;
}

@media(max-width:600px){
    .card img{width:55px;height:55px;}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
    <div class="profile">
        <img src="img/profilna.jpg" alt="Profil Mujagi77">
        <h1>Mujagi77</h1>
        <p id="bio"></p>
        <button onclick="podeliSadrzaj()" class="share-btn">Podeli sa prijateljima</button>
    </div>

    <div class="grid">
        <a class="card" href="https://mujagi77.github.io/logicka-vaga/" aria-label="Logička Vaga">
            <img src="img/logicka-vaga.png" alt="Logička Vaga">
            <div>Logička Vaga</div>
            <div class="play">PLAY</div>
        </a>
        <a class="card" href="https://mujagi77.github.io/lavirint-game/" aria-label="Lavirint">
            <img src="img/lavirint-game.jpg" alt="Lavirint">
            <div>Lavirint</div>
            <div class="play">PLAY</div>
        </a>
        <a class="card" href="https://mujagi77.github.io/Magicna-Karta/" aria-label="Magična Karta">
            <img src="img/magicna-karta.jpg" alt="Magična Karta">
            <div>Magična Karta</div>
            <div class="play">PLAY</div>
        </a>
        <a class="card" href="https://mujagi77.github.io/napredna-slagalica/" aria-label="Slagalica">
            <img src="img/napredna-slagalica.jpg" alt="Slagalica">
            <div>Slagalica</div>
            <div class="play">PLAY</div>
        </a>
    </div>

    <div class="youtube">
        <h3>YouTube Kanal</h3>
        <img src="img/youtube-qr.jpg" alt="YouTube QR">
        <br>
        <a href="https://www.youtube.com/@mujagi77" target="_blank" rel="noopener noreferrer">Otvori kanal</a>
    </div>
</div>

<script>
function podeliSadrzaj() {
    const podaci = { title: 'Mujagi77 | Logic Hub', text: 'Isprobaj ove logičke izazove!', url: window.location.href };
    if (navigator.share) { navigator.share(podaci).catch(console.error); } 
    else { navigator.clipboard.writeText(window.location.href); alert('Link kopiran u klipbord!'); }
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function clickBeep(){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine"; osc.frequency.value = 600; gain.gain.value = 0.08;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
}
document.addEventListener("click", () => { if(audioCtx.state === "suspended") audioCtx.resume(); }, { once:true });
document.querySelectorAll(".card").forEach(card=>card.addEventListener("click", clickBeep));

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener("resize", resize);
let stars = [];
for(let i=0;i<90;i++){ stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.3, d:Math.random()*0.8}); }
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white";
    for(let s of stars){
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
        s.y += s.d; if(s.y > canvas.height){ s.y = 0; s.x = Math.random()*canvas.width; }
    }
    requestAnimationFrame(draw);
}
draw();

// BIO - Fade-in efekat
const bio = document.getElementById("bio");
bio.textContent = "Ja sam Miljan Rančić (mujagi77), autor ovih logičkih i matematičkih igara. Kreiram digitalne izazove koji testiraju vašu logiku, koncentraciju i strpljenje. Sve igre su besplatne i potpuno optimizovane za rad na svim uređajima. Igrajte, vežbajte um i podelite link sa prijateljima!";
setTimeout(() => { bio.classList.add("visible"); }, 100);
</script>
</body>
</html>
